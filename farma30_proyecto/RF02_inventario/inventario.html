<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="stylesheet" href="../shared/global.css"/>
  <link rel="stylesheet" href="inventario.css"/>
</head>
<body>
  <header class="top-bar">
    <span class="rf-tag">RF02</span>
    <span class="top-title">Consulta de Inventario</span>
    <a class="nav-btn" href="../RF01_login/login.html">← RF01</a>
    <a class="nav-btn" href="../RF03_ventas/ventas.html">RF03 →</a>
  </header>
  <main class="page">
    <div class="page-title">RF02 · Consulta de Inventario</div>
    <div class="page-sub">Revisa los medicamentos disponibles en la droguería</div>
    <div class="search-bar">
      <input class="search-input" id="busqueda" placeholder="Buscar medicamento..." oninput="filtrar(this.value)"/>
      <button class="btn btn-outline" onclick="limpiarBusqueda()">Limpiar</button>
    </div>
    <div class="med-grid" id="medGrid"></div>

<body>

  <!-- INCLUIR MENÚ -->
  <link rel="stylesheet" href="../shared/menu.css">
  <script src="../shared/global.js"></script>   <!-- ya lo tienes -->

  <!-- Aquí va el menú -->
  <div id="menuContainer"></div>

  <!-- Contenido de la página -->
  <div style="margin-left: 260px; padding: 20px;">   <!-- ajusta el margen izquierdo -->
    <!-- Tu contenido actual va aquí -->
  </div>

  <script>
    // Cargar el menú
    fetch('../shared/menu.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('menuContainer').innerHTML = html;
        
        // Marcar la página actual como activa
        const currentPath = window.location.pathname;
        document.querySelectorAll('.menu-item').forEach(link => {
          if (link.getAttribute('href').includes(currentPath.split('/').pop())) {
            link.classList.add('active');
          }
        });
      });

    function cerrarSesion() {
      if (confirm('¿Cerrar sesión?')) {
        sessionStorage.clear();
        window.location.href = '../RF01_login/login.html';
      }
    }
  </script>
</html>
