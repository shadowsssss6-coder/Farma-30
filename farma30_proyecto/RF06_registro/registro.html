<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RF06 - Registro de Ventas | Farma 30</title>
  <link rel="stylesheet" href="../shared/global.css"/>
  <link rel="stylesheet" href="registro.css"/>
</head>
<body>
  <header class="top-bar">
    <span class="rf-tag">RF06</span>
    <span class="top-title">Registro de Ventas</span>
    <a class="nav-btn" href="../RF05_deseados/deseados.html">← RF05</a>
    <a class="nav-btn" href="../RF07_vencimientos/vencimientos.html">RF07 →</a>
  </header>
  <main class="page" style="max-width:820px">
    <div class="page-title">RF06 · Registro de Ventas</div>
    <div class="page-sub">Registra una nueva venta seleccionando productos y método de pago</div>
    <div class="card">
      <div class="card-title">Agregar medicamentos</div>
      <div class="search-row">
        <select id="medSelect" class="med-select">
          <option value="">Seleccionar medicamento...</option>
        </select>
        <button class="btn btn-primary" onclick="agregar()">+ Agregar</button>
      </div>
      <table><thead><tr><th>Medicamento</th><th>Precio unit.</th><th>Cant.</th><th>Subtotal</th><th></th></tr></thead>
      <tbody id="detalle"></tbody></table>
      <div class="total-row">
        <span class="total-label">TOTAL:</span>
        <span class="total-val" id="totalVal">$0</span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Método de pago</div>
      <div class="pay-toggle">
        <div class="pay-opt selected" onclick="selectPay(this)"><div class="pay-icon">💵</div><span>Efectivo</span></div>
        <div class="pay-opt" onclick="selectPay(this)"><div class="pay-icon">💳</div><span>Tarjeta</span></div>
        <div class="pay-opt" onclick="selectPay(this)"><div class="pay-icon">📱</div><span>Transferencia</span></div>
      </div>
      <div class="action-row">
        <button class="btn btn-outline" onclick="cancelar()">Cancelar</button>
        <button class="btn btn-success" onclick="registrar()">Registrar Venta</button>
      </div>
    </div>
  </main>
  <div class="toast" id="toast"></div>
  <script src="../shared/global.js"></script>
  <script src="registro.js"></script>
</body>
<body>

  <!-- INCLUIR MENÚ -->
  <link rel="stylesheet" href="../shared/menu.css">
  <script src="../shared/global.js"></script>   <!-- ya lo tienes -->

  <!-- Aquí va el menú -->
  <div id="menuContainer"></div>

  <!-- Contenido de la página -->
  <div style="margin-left: 260px; padding: 20px;">   <!-- ajusta el margen izquierdo -->
    <!-- Tu contenido actual va aquí -->
  </div>

  <script>
    // Cargar el menú
    fetch('../shared/menu.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('menuContainer').innerHTML = html;
        
        // Marcar la página actual como activa
        const currentPath = window.location.pathname;
        document.querySelectorAll('.menu-item').forEach(link => {
          if (link.getAttribute('href').includes(currentPath.split('/').pop())) {
            link.classList.add('active');
          }
        });
      });

    function cerrarSesion() {
      if (confirm('¿Cerrar sesión?')) {
        sessionStorage.clear();
        window.location.href = '../RF01_login/login.html';
      }
    }
  </script>
</html>
