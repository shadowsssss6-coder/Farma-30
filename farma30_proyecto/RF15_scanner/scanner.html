<body>

  <!-- INCLUIR MENÚ -->
  <link rel="stylesheet" href="../shared/menu.css">
  <script src="../shared/global.js"></script>   <!-- ya lo tienes -->

  <!-- Aquí va el menú -->
  <div id="menuContainer"></div>

  <!-- Contenido de la página -->
  <div style="margin-left: 260px; padding: 20px;">   <!-- ajusta el margen izquierdo -->
    <!-- Tu contenido actual va aquí -->
  </div>

  <script>
    // Cargar el menú
    fetch('../shared/menu.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('menuContainer').innerHTML = html;
        
        // Marcar la página actual como activa
        const currentPath = window.location.pathname;
        document.querySelectorAll('.menu-item').forEach(link => {
          if (link.getAttribute('href').includes(currentPath.split('/').pop())) {
            link.classList.add('active');
          }
        });
      });

    function cerrarSesion() {
      if (confirm('¿Cerrar sesión?')) {
        sessionStorage.clear();
        window.location.href = '../RF01_login/login.html';
      }
    }
  </script>
</html>
